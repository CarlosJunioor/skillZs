name: Quality

on:
  pull_request:
  push:
    branches:
      - dev

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Quality gate
        run: npm run quality

      - name: Production build
        run: npm run build
